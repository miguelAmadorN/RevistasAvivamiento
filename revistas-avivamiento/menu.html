<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menú de Revistas | Avivamiento</title>
    <link rel="stylesheet" href="../assets/styles.css" />
  </head>
  <body>
    <header class="hero">
      <h1>Revistas Avivamiento</h1>
    </header>

    <main>
      <section class="search-panel" aria-label="Buscar revistas">
        <label class="search-label" for="revistas-search">Buscar revista</label>
        <input
          id="revistas-search"
          class="search-input"
          type="search"
          placeholder="Escribe un título o descripción"
          autocomplete="off"
        />
        <p id="search-results-count" class="search-results-count" aria-live="polite"></p>
      </section>

      <section id="revistas-grid" class="grid"></section>
      <p id="revistas-empty" class="empty-state" hidden>
        No encontramos revistas con ese criterio. Intenta con otra palabra.
      </p>
    </main>

    <script src="../assets/app.js"></script>
    <script src="../assets/theme.js"></script>
  </body>
</html>
