            border-bottom: 3px solid #3d7eb3;
            display: inline-block;
            padding: 0 2rem 0.4rem;
            letter-spacing: 0.5px;
        }
        .title-section .sub {

            font-size: 1.2rem;
            margin-top: 0.6rem;
            font-style: italic;
        }
        .filter-container {
            background: #ffffffec;
            backdrop-filter: blur(4px);
            border-radius: 60px;
            padding: 0.8rem 2rem;
            margin: 2rem 0 1.5rem;
            box-shadow: 0 8px 22px -10px #1f4b81;
            border: 1px solid #b3cfec;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem 2rem;
        }
        .search-group {
            flex: 2 1 260px;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .search-group i {
            color: #1f6fb0;
            font-size: 1.3rem;
        }
        #searchInput {
            width: 100%;
            padding: 0.9rem 1.3rem;
            border: 1px solid #b6cee8;
            border-radius: 40px;
            font-size: 1rem;
            background: white;
        }
        #searchInput:focus {
            outline: none;
            border-color: #1f6fb0;
            box-shadow: 0 0 0 3px #a7c8ed;
        }
        .alpha-strip {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem 0.4rem;
            background: #daeafc;
            padding: 0.6rem 1.6rem;
            border-radius: 48px;
            justify-content: center;
        }
        .alpha-btn {
            width: 2.7rem;
            height: 2.7rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #7aa9d4;
            border-radius: 40px;
            font-weight: 600;
            font-size: 1.15rem;
            color: #103a5c;
            cursor: pointer;
            transition: 0.1s;
            text-transform: uppercase;
        }
        .alpha-btn:hover {
            background: #cde0f5;
            border-color: #1f6fb0;
        }
        .alpha-btn.active {
            background: #1a5f9c;
            border-color: #0a2e4e;
            color: white;
            box-shadow: 0 4px 10px #397bb5;
        }
        .stats-row {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0 1.2rem;
            color: #1a4c77;
            font-weight: 450;
            padding: 0 0.5rem;
        }
        #clearLink {
            color: #1f5b8c;
            text-decoration: none;
            border-bottom: 1px dashed #7fa9ce;
            cursor: pointer;
        }
        #clearLink:hover {
            color: #083358;
            border-bottom: 1px solid;
        }
        .hymn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.9rem;
            background: #e2efff;
            padding: 2rem 1.3rem;
            border-radius: 36px;
            border: 1px solid #b9d3f2;
            box-shadow: inset 0 0 0 2px #ffffff80, 0 12px 24px -16px #0e3552;
        }
        .hymn-card {
            background: #ffffff;
            border-radius: 30px;
            padding: 0.7rem 0.9rem 0.7rem 1.2rem;
            border-left: 8px solid #4287c0;
            box-shadow: 0 3px 12px #a1c0e0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.94rem;
            line-height: 1.35;
            transition: 0.15s;
            border: 1px solid #d0e3fc;
            border-left-width: 8px;
        }
        .hymn-card:hover {
            background: #f2faff;
            border-left-color: #1c6fb0;
            transform: translateY(-3px);
            box-shadow: 0 20px 20px -12px #2f6599;
        }
        .prefix {
            font-weight: 700;
            color: #13548f;
            background: #dbeafe;
            border-radius: 40px;
            padding: 0.2rem 0.9rem;
            font-size: 0.73rem;
            letter-spacing: 0.5px;
            border: 1px solid #97bee7;
            white-space: nowrap;
            text-transform: uppercase;
        }
        .title {
            font-weight: 450;
            color: #0f2d44;
        }
        .no-result {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 2rem;
            background: #d4e5fc;
            border-radius: 60px;
            color: #1a4c77;
            font-size: 1.3rem;
            border: 2px dashed #7da9d3;
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #2e6190;
            border-top: 1px solid #bdd7f5;
            padding-top: 1.5rem;
        }
    </style>

        const grid = document.getElementById('hymnGrid');
        const searchInput = document.getElementById('searchInput');
        const counterSpan = document.getElementById('counter');
        const clearLink = document.getElementById('clearLink');
        const alphaStrip = document.getElementById('alphaStrip');

        let currentLetter = '';

        // Letras únicas de A a Y (excepto I,K,Ñ,U,W,X,Z)
        const letters = [...new Set(hymns.map(h => h.prefix.charAt(0).toUpperCase()).filter(l => /[A-Y]/.test(l) && !['I','K','U'].includes(l)))].sort();
        alphaStrip.innerHTML = letters.map(l => `<span class="alpha-btn" data-letter="${l}">${l}</span>`).join('');

        function filterAndRender() {
            const term = searchInput.value.toLowerCase();
            let filtered = hymns;

            if (currentLetter) {
                filtered = filtered.filter(h => h.prefix.toUpperCase().startsWith(currentLetter));
            }
            if (term) {
                filtered = filtered.filter(h => h.title.toLowerCase().includes(term) || h.prefix.toLowerCase().includes(term));
            }

            counterSpan.textContent = filtered.length;
            document.querySelectorAll('.alpha-btn').forEach(btn => btn.classList.remove('active'));
            if (currentLetter) {
                const activeBtn = document.querySelector(`.alpha-btn[data-letter="${currentLetter}"]`);
                if (activeBtn) activeBtn.classList.add('active');
            }

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-result"><i class="fa-regular fa-compass"></i> ningún himno coincide</div>`;
                return;
            }

            grid.innerHTML = filtered.map(h =>
                `<div class="hymn-card"><span class="prefix">${h.prefix}</span><span class="title">${h.title}</span></div>`
            ).join('');
        }

        searchInput.addEventListener('input', () => { currentLetter = ''; filterAndRender(); });
        alphaStrip.addEventListener('click', (e) => {
            const btn = e.target.closest('.alpha-btn');
            if (!btn) return;
            const letter = btn.dataset.letter;
            currentLetter = currentLetter === letter ? '' : letter;
            filterAndRender();
        });
        clearLink.addEventListener('click', (e) => {
            e.preventDefault();
            searchInput.value = '';
            currentLetter = '';
            filterAndRender();
        });

        filterAndRender();
